<!DOCTYPE html>
<html>
<head>
    <title>Edit {{ folder.name }}</title>
</head>
<body>

<h1>Edit {{ folder.name }}</h1>

<form method="POST">
    {% csrf_token %}

    <textarea
        name="description"
        rows="25"
        cols="100"
    >{{ folder.description }}</textarea>

    <br><br>

    <button type="submit">
        Save Changes
    </button>

</form>

<br>

<a href="{% url 'workspace_folder' project.pk folder.pk %}">
    Cancel
</a>

</body>
</html>
