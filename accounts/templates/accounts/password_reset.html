<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
</head>
<body>

<h1>Forgot your password?</h1>

<p>
Enter your email address and we'll send you a password reset link.
</p>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">
        Send Reset Email
    </button>
</form>

</body>
</html>
